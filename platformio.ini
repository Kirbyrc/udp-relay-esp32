; UDP Broadcast Relay — Waveshare ESP32-S3-Zero
; Two nodes connected via UART, each on a different WiFi network.
; Flash node_a to the board on network A, node_b to the board on network B.

[platformio]
default_envs = node_lan

[base]
platform                        = espressif32
board                           = esp32-s3-devkitm-1
framework                       = arduino
upload_speed                    = 921600
monitor_speed                   = 115200
monitor_filters                 = esp32_exception_decoder, default, time

; ESP32-S3FH4R2: 4 MB Flash (QIO), 2 MB PSRAM (QSPI)
board_build.flash_size          = 4MB
board_upload.flash_size         = 4MB
board_build.arduino.memory_type = qio_qspi
board_build.partitions          = default.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    adafruit/Adafruit NeoPixel
    me-no-dev/AsyncTCP @ ^1.1.1
    me-no-dev/ESPAsyncWebServer @ ^1.2.3

[env:node_lan]
extends     = base
build_flags =
    ${base.build_flags}
    -DNODE_LAN=1

[env:node_iot]
extends     = base
build_flags =
    ${base.build_flags}
    -DNODE_IOT=1
